<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080c12"/>
      <stop offset="60%" stop-color="#0e1a28"/>
      <stop offset="100%" stop-color="#1a2e40"/>
    </linearGradient>
    <linearGradient id="brick5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a3028"/>
      <stop offset="50%" stop-color="#6e3a30"/>
      <stop offset="100%" stop-color="#5a3028"/>
    </linearGradient>
    <linearGradient id="win5light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe0a0"/>
      <stop offset="100%" stop-color="#ff9a30"/>
    </linearGradient>
    <linearGradient id="ground5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a32"/>
      <stop offset="100%" stop-color="#1e1e26"/>
    </linearGradient>
    <filter id="winGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="lampGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>

  <!-- Ciel nocturne -->
  <rect width="800" height="500" fill="url(#sky5)"/>

  <!-- Étoiles -->
  <circle cx="60" cy="25" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="150" cy="45" r="1" fill="white" opacity="0.5"/>
  <circle cx="240" cy="18" r="2" fill="white" opacity="0.6"/>
  <circle cx="380" cy="38" r="1" fill="white" opacity="0.4"/>
  <circle cx="500" cy="22" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="620" cy="48" r="1" fill="white" opacity="0.5"/>
  <circle cx="720" cy="28" r="2" fill="white" opacity="0.6"/>
  <circle cx="450" cy="60" r="1.5" fill="white" opacity="0.4"/>

  <!-- Lune croissant -->
  <circle cx="700" cy="60" r="28" fill="#d4c880" opacity="0.35"/>
  <circle cx="712" cy="55" r="22" fill="#0e1a28" opacity="1"/>

  <!-- Immeubles fond gauche -->
  <rect x="0" y="220" width="80" height="280" fill="#0d1622"/>
  <rect x="70" y="250" width="55" height="250" fill="#0f1a26"/>
  <rect x="0" y="260" width="25" height="5" fill="#ffe880" opacity="0.15"/>
  <rect x="0" y="290" width="25" height="5" fill="#ffe880" opacity="0.1"/>
  <rect x="30" y="275" width="25" height="5" fill="#ffe880" opacity="0.15"/>

  <!-- Immeubles fond droite -->
  <rect x="670" y="230" width="80" height="270" fill="#0d1622"/>
  <rect x="710" y="210" width="90" height="290" fill="#0f1a26"/>
  <rect x="675" y="250" width="25" height="5" fill="#ffe880" opacity="0.15"/>
  <rect x="720" y="230" width="25" height="5" fill="#ffe880" opacity="0.12"/>
  <rect x="750" y="250" width="25" height="5" fill="#ffe880" opacity="0.1"/>

  <!-- SOL -->
  <rect x="0" y="440" width="800" height="60" fill="url(#ground5)"/>
  <rect x="0" y="438" width="800" height="4" fill="#3a3a48" opacity="0.8"/>

  <!-- Reflets pluie au sol -->
  <ellipse cx="400" cy="448" rx="120" ry="8" fill="#ffe890" opacity="0.04"/>
  <ellipse cx="180" cy="445" rx="80" ry="6" fill="#ffe890" opacity="0.03"/>
  <ellipse cx="620" cy="445" rx="80" ry="6" fill="#ffe890" opacity="0.03"/>

  <!-- FAÇADE BRIQUE principale -->
  <rect x="110" y="80" width="580" height="365" fill="url(#brick5)"/>

  <!-- Motif briques (lignes horizontales) -->
  <line x1="110" y1="100" x2="690" y2="100" stroke="#4a2820" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="120" x2="690" y2="120" stroke="#4a2820" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="140" x2="690" y2="140" stroke="#4a2820" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="160" x2="690" y2="160" stroke="#4a2820" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="180" x2="690" y2="180" stroke="#4a2820" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="200" x2="690" y2="200" stroke="#4a2820" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="220" x2="690" y2="220" stroke="#4a2820" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="240" x2="690" y2="240" stroke="#4a2820" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="260" x2="690" y2="260" stroke="#4a2820" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="280" x2="690" y2="280" stroke="#4a2820" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="300" x2="690" y2="300" stroke="#4a2820" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="320" x2="690" y2="320" stroke="#4a2820" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="340" x2="690" y2="340" stroke="#4a2820" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="360" x2="690" y2="360" stroke="#4a2820" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="380" x2="690" y2="380" stroke="#4a2820" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="400" x2="690" y2="400" stroke="#4a2820" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="420" x2="690" y2="420" stroke="#4a2820" stroke-width="1" opacity="0.5"/>

  <!-- Lignes verticales briques (décalées par rangée) -->
  <!-- Rangées paires -->
  <line x1="175" y1="80" x2="175" y2="440" stroke="#4a2820" stroke-width="0.8" opacity="0.4"/>
  <line x1="240" y1="80" x2="240" y2="440" stroke="#4a2820" stroke-width="0.8" opacity="0.4"/>
  <line x1="305" y1="80" x2="305" y2="440" stroke="#4a2820" stroke-width="0.8" opacity="0.4"/>
  <line x1="370" y1="80" x2="370" y2="440" stroke="#4a2820" stroke-width="0.8" opacity="0.4"/>
  <line x1="435" y1="80" x2="435" y2="440" stroke="#4a2820" stroke-width="0.8" opacity="0.4"/>
  <line x1="500" y1="80" x2="500" y2="440" stroke="#4a2820" stroke-width="0.8" opacity="0.4"/>
  <line x1="565" y1="80" x2="565" y2="440" stroke="#4a2820" stroke-width="0.8" opacity="0.4"/>
  <line x1="630" y1="80" x2="630" y2="440" stroke="#4a2820" stroke-width="0.8" opacity="0.4"/>

  <!-- Corniche métal haut -->
  <rect x="100" y="75" width="600" height="12" fill="#2a3a4a"/>
  <rect x="100" y="84" width="600" height="3" fill="#3DBFB8" opacity="0.4"/>

