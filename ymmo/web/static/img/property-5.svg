  <!-- RANGÉE 1 (y=100-190) — Arc en ogive -->
  <!-- Grande fenêtre 1 -->
  <rect x="130" y="100" width="120" height="125" fill="rgba(0,0,0,0.5)" rx="2"/>
  <path d="M130 185 L130 108 Q190 78 250 108 L250 185Z" fill="url(#win5light)" opacity="0.85" filter="url(#winGlow)"/>
  <line x1="190" y1="100" x2="190" y2="185" stroke="#6a4020" stroke-width="3" opacity="0.6"/>
  <line x1="130" y1="145" x2="250" y2="145" stroke="#6a4020" stroke-width="2" opacity="0.5"/>
  <rect x="128" y="98" width="124" height="129" stroke="#8a5030" stroke-width="2.5" fill="none" rx="2"/>

  <!-- Grande fenêtre 2 -->
  <rect x="270" y="100" width="120" height="125" fill="rgba(0,0,0,0.5)" rx="2"/>
  <path d="M270 185 L270 108 Q330 78 390 108 L390 185Z" fill="url(#win5light)" opacity="0.75" filter="url(#winGlow)"/>
  <line x1="330" y1="100" x2="330" y2="185" stroke="#6a4020" stroke-width="3" opacity="0.6"/>
  <line x1="270" y1="145" x2="390" y2="145" stroke="#6a4020" stroke-width="2" opacity="0.5"/>
  <rect x="268" y="98" width="124" height="129" stroke="#8a5030" stroke-width="2.5" fill="none" rx="2"/>

  <!-- Grande fenêtre 3 -->
  <rect x="410" y="100" width="120" height="125" fill="rgba(0,0,0,0.5)" rx="2"/>
  <path d="M410 185 L410 108 Q470 78 530 108 L530 185Z" fill="url(#win5light)" opacity="0.9" filter="url(#winGlow)"/>
  <line x1="470" y1="100" x2="470" y2="185" stroke="#6a4020" stroke-width="3" opacity="0.6"/>
  <line x1="410" y1="145" x2="530" y2="145" stroke="#6a4020" stroke-width="2" opacity="0.5"/>
  <rect x="408" y="98" width="124" height="129" stroke="#8a5030" stroke-width="2.5" fill="none" rx="2"/>

  <!-- Grande fenêtre 4 -->
  <rect x="550" y="100" width="120" height="125" fill="rgba(0,0,0,0.5)" rx="2"/>
  <path d="M550 185 L550 108 Q610 78 670 108 L670 185Z" fill="url(#win5light)" opacity="0.65" filter="url(#winGlow)"/>
  <line x1="610" y1="100" x2="610" y2="185" stroke="#6a4020" stroke-width="3" opacity="0.6"/>
  <line x1="550" y1="145" x2="670" y2="145" stroke="#6a4020" stroke-width="2" opacity="0.5"/>
  <rect x="548" y="98" width="124" height="129" stroke="#8a5030" stroke-width="2.5" fill="none" rx="2"/>

  <!-- RANGÉE 2 (y=215-305) -->
  <rect x="130" y="215" width="120" height="95" fill="rgba(0,0,0,0.5)" rx="1"/>
  <rect x="132" y="217" width="116" height="91" fill="url(#win5light)" opacity="0.7" filter="url(#winGlow)" rx="1"/>
  <line x1="190" y1="215" x2="190" y2="310" stroke="#6a4020" stroke-width="2.5" opacity="0.6"/>
  <line x1="130" y1="262" x2="250" y2="262" stroke="#6a4020" stroke-width="2" opacity="0.5"/>

  <rect x="270" y="215" width="120" height="95" fill="rgba(0,0,0,0.5)" rx="1"/>
  <rect x="272" y="217" width="116" height="91" fill="url(#win5light)" opacity="0.55" filter="url(#winGlow)" rx="1"/>
  <line x1="330" y1="215" x2="330" y2="310" stroke="#6a4020" stroke-width="2.5" opacity="0.6"/>
  <line x1="270" y1="262" x2="390" y2="262" stroke="#6a4020" stroke-width="2" opacity="0.5"/>

  <rect x="410" y="215" width="120" height="95" fill="rgba(0,0,0,0.5)" rx="1"/>
  <rect x="412" y="217" width="116" height="91" fill="url(#win5light)" opacity="0.8" filter="url(#winGlow)" rx="1"/>
  <line x1="470" y1="215" x2="470" y2="310" stroke="#6a4020" stroke-width="2.5" opacity="0.6"/>
  <line x1="410" y1="262" x2="530" y2="262" stroke="#6a4020" stroke-width="2" opacity="0.5"/>

  <rect x="550" y="215" width="120" height="95" fill="rgba(0,0,0,0.5)" rx="1"/>
  <rect x="552" y="217" width="116" height="91" fill="url(#win5light)" opacity="0.5" filter="url(#winGlow)" rx="1"/>
  <line x1="610" y1="215" x2="610" y2="310" stroke="#6a4020" stroke-width="2.5" opacity="0.6"/>
  <line x1="550" y1="262" x2="670" y2="262" stroke="#6a4020" stroke-width="2" opacity="0.5"/>

  <!-- RANGÉE 3 (y=328-400) -->
  <rect x="130" y="328" width="120" height="78" fill="rgba(0,0,0,0.5)" rx="1"/>
  <rect x="132" y="330" width="116" height="74" fill="url(#win5light)" opacity="0.6" rx="1"/>
  <line x1="190" y1="328" x2="190" y2="406" stroke="#6a4020" stroke-width="2.5" opacity="0.6"/>

  <rect x="270" y="328" width="120" height="78" fill="rgba(0,0,0,0.5)" rx="1"/>
  <rect x="272" y="330" width="116" height="74" fill="url(#win5light)" opacity="0.75" rx="1"/>
  <line x1="330" y1="328" x2="330" y2="406" stroke="#6a4020" stroke-width="2.5" opacity="0.6"/>

  <!-- Porte atelier (grande, double) -->
  <rect x="390" y="330" width="140" height="115" fill="#1a2430" rx="2"/>
  <rect x="393" y="333" width="63" height="110" stroke="#C9A84C" stroke-width="2" fill="rgba(255,180,80,0.04)" rx="1"/>
  <rect x="461" y="333" width="66" height="110" stroke="#C9A84C" stroke-width="2" fill="rgba(255,180,80,0.04)" rx="1"/>
  <rect x="393" y="333" width="30" height="52" fill="#ffe8a0" opacity="0.12"/>
  <rect x="425" y="333" width="30" height="52" fill="#ffe8a0" opacity="0.12"/>
  <rect x="461" y="333" width="31" height="52" fill="#ffe8a0" opacity="0.12"/>
  <rect x="495" y="333" width="29" height="52" fill="#ffe8a0" opacity="0.12"/>
  <circle cx="455" cy="400" r="4" fill="#C9A84C"/>
  <circle cx="461" cy="400" r="4" fill="#C9A84C"/>

  <rect x="550" y="328" width="120" height="78" fill="rgba(0,0,0,0.5)" rx="1"/>
  <rect x="552" y="330" width="116" height="74" fill="url(#win5light)" opacity="0.5" rx="1"/>
  <line x1="610" y1="328" x2="610" y2="406" stroke="#6a4020" stroke-width="2.5" opacity="0.6"/>

  <!-- Plaques tuyaux / conduits industriels -->
  <rect x="115" y="200" width="12" height="180" fill="#3a3540" rx="3"/>
  <rect x="110" y="280" width="20" height="12" fill="#4a4550" rx="2"/>
  <rect x="673" y="200" width="12" height="180" fill="#3a3540" rx="3"/>
  <rect x="670" y="280" width="20" height="12" fill="#4a4550" rx="2"/>

  <!-- Lampadaires rue -->
  <rect x="210" y="370" width="5" height="78" fill="#555"/>
  <path d="M215 372 Q228 358 238 366" stroke="#777" stroke-width="2.5" fill="none"/>
  <circle cx="239" cy="365" r="7" fill="#ffe880" opacity="0.9" filter="url(#lampGlow)"/>
  <circle cx="239" cy="365" r="14" fill="#ffe880" opacity="0.18"/>
  <ellipse cx="239" cy="445" rx="25" ry="8" fill="#ffe880" opacity="0.07"/>

  <rect x="585" y="370" width="5" height="78" fill="#555"/>
  <path d="M585 372 Q572 358 562 366" stroke="#777" stroke-width="2.5" fill="none"/>
  <circle cx="561" cy="365" r="7" fill="#ffe880" opacity="0.9" filter="url(#lampGlow)"/>
  <circle cx="561" cy="365" r="14" fill="#ffe880" opacity="0.18"/>
  <ellipse cx="561" cy="445" rx="25" ry="8" fill="#ffe880" opacity="0.07"/>

  <!-- Enseigne "LOFT" néon teal -->
  <text x="400" y="82" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#3DBFB8" text-anchor="middle" opacity="0.85" filter="url(#winGlow)">LOFT &amp; CO.</text>
  <rect x="305" y="68" width="190" height="2" fill="#3DBFB8" opacity="0.3"/>

  <!-- Bande info -->
  <rect x="0" y="462" width="800" height="38" fill="rgba(5,5,12,0.82)"/>
  <text x="22" y="488" font-family="Georgia,serif" font-size="15" font-weight="bold" fill="#C9A84C">Loft Urbain — Halle Industrielle</text>
  <text x="778" y="488" font-family="Georgia,serif" font-size="12" fill="#3DBFB8" text-anchor="end">Ymmo Immobilier</text>
</svg>
