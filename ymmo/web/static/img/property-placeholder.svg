<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#16161F"/>
  <rect x="0" y="0" width="400" height="300" fill="none" stroke="#C9A84C" stroke-width="1" stroke-opacity="0.15"/>
  <!-- House outline -->
  <g transform="translate(200,150)" opacity="0.3">
    <polygon points="0,-70 70,0 70,60 -70,60 -70,0" fill="none" stroke="#C9A84C" stroke-width="2" stroke-linejoin="round"/>
    <polyline points="-85,0 0,-80 85,0" fill="none" stroke="#C9A84C" stroke-width="2" stroke-linejoin="round"/>
    <!-- Door -->
    <rect x="-15" y="20" width="30" height="40" fill="none" stroke="#3DBFB8" stroke-width="1.5" rx="2"/>
    <!-- Windows -->
    <rect x="-55" y="5" width="25" height="20" fill="none" stroke="#3DBFB8" stroke-width="1.5" rx="2"/>
    <rect x="30" y="5" width="25" height="20" fill="none" stroke="#3DBFB8" stroke-width="1.5" rx="2"/>
  </g>
  <!-- Dots / texture -->
  <circle cx="40"  cy="40"  r="1.5" fill="#C9A84C" opacity="0.2"/>
  <circle cx="360" cy="40"  r="1.5" fill="#C9A84C" opacity="0.2"/>
  <circle cx="40"  cy="260" r="1.5" fill="#3DBFB8" opacity="0.2"/>
  <circle cx="360" cy="260" r="1.5" fill="#3DBFB8" opacity="0.2"/>
  <!-- Label -->
  <text x="200" y="255" text-anchor="middle" font-family="Georgia, serif" font-size="13"
        fill="#606075" letter-spacing="3">YMMO</text>
</svg>
