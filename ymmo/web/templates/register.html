{{template "header" .}}
{{template "nav" .}}
{{template "flash" .}}

<section class="auth-section">
  <div class="auth-container auth-container--wide">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="/">
          <span class="logo-icon">⬡</span>
          <span class="logo-text">Ymmo</span>
        </a>
      </div>
      <h1 class="auth-title">Créer un compte</h1>
      <p class="auth-subtitle">Rejoignez la communauté Ymmo gratuitement</p>

      {{$data := .Data}}
      {{if $data}}
      {{if $data.Error}}
      <div class="alert alert--error">{{$data.Error}}</div>
      {{end}}
      {{end}}

      <form action="/inscription" method="POST" class="auth-form">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Prénom</label>
            <input type="text" name="first_name" value="{{if $data}}{{$data.FirstName}}{{end}}" placeholder="Jean"
                   class="form-control" required autocomplete="given-name">
          </div>
          <div class="form-group">
            <label class="form-label">Nom</label>
            <input type="text" name="last_name" value="{{if $data}}{{$data.LastName}}{{end}}" placeholder="Dupont"
                   class="form-control" required autocomplete="family-name">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Adresse email</label>
          <input type="email" name="email" value="{{if $data}}{{$data.Email}}{{end}}" placeholder="votre@email.fr"
                 class="form-control" required autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label">Téléphone <span class="text-muted">(facultatif)</span></label>
          <input type="tel" name="phone" value="{{if $data}}{{$data.Phone}}{{end}}" placeholder="06 12 34 56 78"
                 class="form-control" autocomplete="tel">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Mot de passe</label>
            <div class="input-with-toggle">
              <input type="password" name="password" placeholder="8 caractères minimum"
                     class="form-control" required minlength="8" id="pwd1" autocomplete="new-password">
              <button type="button" class="input-toggle" onclick="togglePwd('pwd1',this)" aria-label="Afficher le mot de passe">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirmer</label>
            <div class="input-with-toggle">
              <input type="password" name="confirm_password" placeholder="Répéter le mot de passe"
                     class="form-control" required minlength="8" id="pwd2" autocomplete="new-password">
              <button type="button" class="input-toggle" onclick="togglePwd('pwd2',this)" aria-label="Afficher le mot de passe">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
        </div>

        <div class="password-strength" id="pwStrength"></div>

        <div class="form-group form-check">
          <input type="checkbox" id="terms" required class="check-input">
          <label for="terms" class="check-label">
            J'accepte les <a href="#" class="text-gold">conditions d'utilisation</a> et la <a href="#" class="text-gold">politique de confidentialité</a>
          </label>
        </div>

        <button type="submit" class="btn btn-gold btn-block btn-lg">Créer mon compte</button>
      </form>

      <div class="auth-divider"><span>Déjà inscrit ?</span></div>
      <a href="/connexion" class="btn btn-outline btn-block">Se connecter</a>
    </div>
  </div>
</section>

<script>
document.getElementById('pwd1').addEventListener('input', function() {
  const val = this.value;
  const el = document.getElementById('pwStrength');
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const labels = ['', 'Faible', 'Moyen', 'Fort', 'Très fort'];
  const classes = ['', 'strength-1', 'strength-2', 'strength-3', 'strength-4'];
  el.className = 'password-strength ' + (score > 0 ? classes[score] : '');
  el.textContent = score > 0 ? 'Force: ' + labels[score] : '';
});
</script>

{{template "footer" .}}
